name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release from notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          NOTES_FILE=".trae/documents/release-notes-${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            gh release create "$VERSION" --repo "$GITHUB_REPOSITORY" \
              --title "$VERSION" \
              --notes-file "$NOTES_FILE"
            echo "Created release $VERSION from $NOTES_FILE"
          else
            gh release create "$VERSION" --repo "$GITHUB_REPOSITORY" \
              --title "$VERSION" \
              --generate-notes
            echo "Created release $VERSION with auto-generated notes (file $NOTES_FILE not found)"
          fi
